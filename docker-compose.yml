version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobpulse
      POSTGRES_USER: jobpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  # backend:
  #   build: ./backend
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - postgres

  # Frontend application
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - backend

  # Scraper workers
  # scraper:
  #   build: ./scraper
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
